<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot-lator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Brainrot-lator</h1>
    <h2>Year:</h2>
    <div class = "mode">
        <button onclick = "">2023</button>
        <button onclick = "">2024</button>
        <button onclick = "">2025</button>
        <button onclick = "">2026</button>
    </div>
    <div class = "translator">
        <input type="text" id="input" name="input"><br><br>
        <button onclick="translateText()">Translate</button>
        <p id="output"></p>
    </div>

<script>
const dictionary = {
    nouns: {
        "love": "rizz",
        "thing": "skibidi",
        "butt": "gyatt",
        "person": "rizzler",
        "popularity": "aura"
    },
    verbs: {
        "show": "mogg",
        "take": "fanum tax",
        "do": "mew",
        "is":"be"
    },
    adjectives: {
        "bad": "cooked",
        "great": "rizzy",
        "good": "sigma"
    },
    pronouns: {
        "this": "ts",
        "you": "bruh",
        "he": "diddyblud"
    }
};
const dictionaryValues = Object.values(dictionary);

const nouns = Object.values(dictionary.nouns);
const verbs = Object.values(dictionary.verbs);
const adjectives = Object.values(dictionary.adjectives);
const pronouns = Object.values(dictionary.pronouns);


function getRandomItem(arr) {
    // Generate a random number between 0 (inclusive) and 1 (exclusive),
    // multiply by array length to scale the range,
    // and use Math.floor to get a whole number index.
    const randomIndex = Math.floor(Math.random() * arr.length);
    
    // Return the element at the random index
    return arr[randomIndex];
    
}
function partOfSpeechdetect(wordtodetect, wordlist, translatedWords)
{
    const index = wordlist.indexOf(wordtodetect)

    if (index === 0)
    {
        console.log("pronoun")
        translatedWords.push(getRandomItem(pronouns));
    }
    else if (index === 1)
    {
        console.log("verb")
        translatedWords.push(getRandomItem(verbs));
    }
    else if (index === wordlist.length - 1)
    {
        console.log("noun")
        translatedWords.push(getRandomItem(nouns));
    }
    else if (index === wordlist.length - 2)
    {
        console.log("adjective")
        translatedWords.push(getRandomItem(adjectives));
    }
    else{
        console.log("idk bud")
        translatedWords.push(wordtodetect);
    }

}

function translateText()
{
    let input = document.getElementById("input").value.toLowerCase();

    let words = input.split(" ");

    let translatedWords = [];

    words.forEach(word => {
        if(dictionary[word])
        {
            translatedWords.push(dictionary[word]);
        }
        else
        {
            partOfSpeechdetect(word, words, translatedWords);
        }
        
        

    });
    let result = translatedWords

    document.getElementById("output").innerText = result;

}
</script>
</body>
</html>
