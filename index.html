<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>
    <h1>Brainrot-lator</h1>
    <h2>Year:</h2>
    <div class = "mode">
        <button onclick = "">2023</button>
        <button onclick = "">2024</button>
        <button onclick = "">2025</button>
        <button onclick = "">2026</button>
    </div>
    <div class = "translator">
        <input type="text" id="input" name="input"><br><br>
        <button onclick="translateText()">Translate</button>
        <p id="output"></p>
    </div>

<script>
const dictionary={
    "love":"rizz",
    "show":"mogg",
    "take":"fanum tax", 
    "do":"mew",
    "thing":"skibidi",
    "butt":"gyatt",
    "person":"rizzler",
    "popularity":"aura",
    "bad":"cooked",
    "great":"rizzy",
    "good":"sigma",
    "this":"ts", 
    "you":"my guy", 
    "he":"diddyblud", 
    "you":"bruh"
}
const dictionaryValues = Object.values(dictionary);

function getRandomItem(arr) {
    // Generate a random number between 0 (inclusive) and 1 (exclusive),
    // multiply by array length to scale the range,
    // and use Math.floor to get a whole number index.
    const randomIndex = Math.floor(Math.random() * arr.length);
    
    // Return the element at the random index
    return arr[randomIndex];
    
}
function partOfSpeechdetect(wordtodetect, wordlist)
{
    const index = wordlist.indexOf(wordtodetect)

    if (index === 0)
    {
        console.log("pronoun")
    }
    else if (index === 1)
    {
        console.log("verb")
    }
    else if (index === wordlist.length - 1)
    {
        console.log("noun")
    }
    else if (index === wordlist.length - 2)
    {
        console.log("adjective")
    }
    else{
        console.log("idk bud")
    }

}

function translateText()
{
    let input = document.getElementById("input").value.toLowerCase();

    let words = input.split(" ");

    let translatedWords = [];

    words.forEach(word => {
        if(dictionary[word])
        {
            translatedWords.push(dictionary[word]);
        }
        else
        {
            partOfSpeechdetect(word, words);
        }
        
        

    });
    let result = translatedWords

    document.getElementById("output").innerText = result;

}
</script>
</body>
