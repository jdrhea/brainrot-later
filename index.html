<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainrot-lator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Brainrot-lator</h1>
    <h2>Language:</h2>
    <div class = "mode">
        <button onclick = "changeLanguage('General Brainrot Language')">GBL</button>
        <button onclick = "changeLanguage('2023')">2023</button>
        <button onclick = "changeLanguage('2024')">2024</button>
        <button onclick = "changeLanguage('2025')">2025</button>
        <button onclick = "changeLanguage('2026')">2026</button>
    </div>
    <div class = "translator">
        <p id="Language">Language: General Brainrot Language</p>
        <input type="text" id="input" name="input"><br><br>
        <button onclick="translateText()">Translate</button>
        <p id="output">Text Will Appear Here</p>
    </div>

<script>
const dictionary = {
    nouns: {
        "love": "rizz",
        "thing": "skibidi",
        "butt": "gyatt",
        "person": "rizzler",
        "popularity": "aura"
    },
    verbs: {
        "show": "mogg",
        "take": "fanum tax",
        "do": "mew",
        "is":"be",
        "more":"maxxing"
    },
    adjectives: {
        "bad": "cooked",
        "great": "rizzy",
        "good": "sigma",
        "old":"unc",
        "ugly":"chopped"
    },
    pronouns: {
        "this": "ts",
        "you": "bruh",
        "he": "diddyblud"
    }
};
const dictionaryValues = Object.values(dictionary);
const flatDictionary = Object.assign({}, ...Object.values(dictionary));

const nouns = Object.values(dictionary.nouns);
const verbs = Object.values(dictionary.verbs);
const adjectives = Object.values(dictionary.adjectives);
const pronouns = Object.values(dictionary.pronouns);


function getRandomItem(arr) {
    // Generate a random number between 0 (inclusive) and 1 (exclusive),
    // multiply by array length to scale the range,
    // and use Math.floor to get a whole number index.
    const randomIndex = Math.floor(Math.random() * arr.length);
    
    // Return the element at the random index
    return arr[randomIndex];
    
}
function changeLanguage(language)
{
    document.getElementById("Language").innerText = "Language: " + language;
}
function partOfSpeechdetect(wordtodetect, wordlist, translatedWords)
{
    const index = wordlist.indexOf(wordtodetect)

    if (index === 0)
    {
        console.log("pronoun")
        translatedWords.push(getRandomItem(pronouns));
        
    }
    else if (index === 1)
    {
        console.log("verb")
        translatedWords.push(getRandomItem(verbs));
    }
    else if (index === wordlist.length - 1)
    {
        console.log("noun")
        translatedWords.push(getRandomItem(nouns));
    }
    else if (index === wordlist.length - 2)
    {

        translatedWords.push(getRandomItem(adjectives));
    }
    else{
        translatedWords.push(wordtodetect);
    }

}

function translateText()
{
    let input = document.getElementById("input").value.toLowerCase();

    let words = input.split(" ");

    let translatedWords = [];

    words.forEach(word => {
        if (flatDictionary[word])
        {
            translatedWords.push(flatDictionary[word]);
        }
        else
        {
            partOfSpeechdetect(word, words, translatedWords);
        }
        
        

    });
    let result = translatedWords.join(" ");

    document.getElementById("output").innerText = result;

}
</script>
</body>
</html>
